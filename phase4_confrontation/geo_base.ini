# geo_base.ini — Tier-2 CLASS baseline (PHASE3_BOLTZMANN_DESI_SCOPE 2026-07-06)
# Planck-2018 nu-less pair, consistent with script5 Tier-1 (mnu deferred);
# A_s is the Tier-1 sigma8-tuned value (baseline for RATIOS; absolute sigma8
# reported from the run log).
h = 0.6736
omega_b = 0.02237
omega_cdm = 0.1200
A_s = 2.0411e-9
n_s = 0.9649
tau_reio = 0.0544
N_ur = 3.046
N_ncdm = 0
Omega_k = 0.

# Newtonian gauge REQUIRED: the GEO drag acts on theta_cdm, which is
# identically zero in synchronous gauge (gauge fixed to CDM frame).
gauge = newtonian

output = tCl,pCl,lCl,mPk
lensing = yes
l_max_scalars = 2500
P_k_max_h/Mpc = 1.0
z_pk = 0.

# root appended per-case by the runner
